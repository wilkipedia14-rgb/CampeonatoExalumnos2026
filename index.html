      +'<div class="playoff-matches">'+sfHtml+'</div>'
      +'<div style="border-top:2px solid #eee;margin:16px 0;"></div>'
      +'<div style="font-family:Oswald,sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:'+color+';border-left:4px solid '+color+';padding-left:8px;margin-bottom:12px;">🏆 Gran Final</div>'
      +'<div class="playoff-matches">'+finalHtml+'</div>'
      +'</div></div>';
  } catch(e){
    out+='<div style="padding:20px;color:red;">Error en fase final: '+e.message+'</div>';
  }
  out+='</div>';
  container.innerHTML=out;
}

// ── WALKOVER DIRECT (no modal) ───────────────────────────────
function setWODirect(catId,fi,mi,side){
  const m=state[catId].fixture[fi].matches[mi];
  if(m.walkover===side){
    // Already set - remove WO
    m.walkover=false; m.played=false; m.homeGoals=null; m.awayGoals=null;
  } else {
    // Set WO
    m.walkover=side; m.played=true;
    m.homeGoals=side==='home'?3:0;
    m.awayGoals=side==='away'?3:0;
  }
  saveData(); renderAll();
}

function setElimWODirect(catId,idx,side){
  const m=state[catId].eliminacion.matches[idx];
  if(m.walkover===side){
    m.walkover=false; m.played=false; m.homeGoals=null; m.awayGoals=null;
  } else {
    m.walkover=side; m.played=true;
    m.homeGoals=side==='home'?3:0;
    m.awayGoals=side==='away'?3:0;
  }
  saveData(); renderAll();
}

function setPlayoffWODirect(catId,phase,idx,side){
  const m=state[catId].playoffs[phase][idx];
  if(m.walkover===side){
    m.walkover=false; m.played=false; m.homeGoals=null; m.awayGoals=null;
    m.hasPens=false; m.homePens=null; m.awayPens=null;
  } else {
    m.walkover=side; m.played=true;
    m.homeGoals=side==='home'?3:0;
    m.awayGoals=side==='away'?3:0;
    m.hasPens=false;
  }
  saveData(); renderAll();
}

// ── WALKOVER MODAL ────────────────────────────────────────────
function openWalkoverModal(catId,fi,mi){
  currentModalData={catId,fi,mi};
  const m=state[catId].fixture[fi].matches[mi];
  document.getElementById('modal-title').textContent='Walkover';
  document.getElementById('modal-body').innerHTML=`
    <p style="font-size:12px;color:#555;margin-bottom:12px;">El <strong>walkover</strong> otorga 3 puntos al equipo presente. Equipo ausente recibe 0.</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:2px solid ${m.walkover==='home'?'var(--red)':'var(--border)'};border-radius:3px;" onclick="selWO('home')">
        <input type="radio" name="wo" value="home" ${m.walkover==='home'?'checked':''}> <strong style="font-family:'Roboto Condensed';text-transform:uppercase;">${escHtml(m.home)}</strong> <span style="font-size:11px;color:#666;">gana por W/O (+3 pts)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:2px solid ${m.walkover==='away'?'var(--red)':'var(--border)'};border-radius:3px;" onclick="selWO('away')">
        <input type="radio" name="wo" value="away" ${m.walkover==='away'?'checked':''}> <strong style="font-family:'Roboto Condensed';text-transform:uppercase;">${escHtml(m.away)}</strong> <span style="font-size:11px;color:#666;">gana por W/O (+3 pts)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:2px solid var(--border);border-radius:3px;" onclick="selWO('none')">
        <input type="radio" name="wo" value="none" ${!m.walkover?'checked':''}> <span style="font-size:12px;color:#555;">Sin walkover (partido normal)</span>
      </label>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function selWO(v){document.querySelectorAll('input[name="wo"]').forEach(r=>r.checked=(r.value===v));}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function confirmModal(){
  const val=document.querySelector('input[name="wo"]:checked')?.value;
  // ── Playoff WO ──
  if(currentModalData.type==='playoff'){
    setPlayoffWO(currentModalData.catId, currentModalData.phase, currentModalData.idx, val);
    return;
  }
  // ── Eliminacion WO ──
  if(currentModalData.type==='elim'){
    const m=state[currentModalData.catId].eliminacion.matches[currentModalData.idx];
    if(!val||val==='none'){m.walkover=false;m.played=false;m.homeGoals=null;m.awayGoals=null;}
    else{m.walkover=val;m.played=true;if(val==='home'){m.homeGoals=3;m.awayGoals=0;}else{m.homeGoals=0;m.awayGoals=3;}}
    closeModal(); saveData(); renderAll();
    return;
  }
  // ── Fixture WO ──
  const{catId,fi,mi}=currentModalData;
  const m=state[catId].fixture[fi].matches[mi];
  if(!val||val==='none'){m.walkover=false;m.played=false;m.homeGoals=null;m.awayGoals=null;}
  else{m.walkover=val;m.played=true;if(val==='home'){m.homeGoals=3;m.awayGoals=0;}else{m.homeGoals=0;m.awayGoals=3;}}
  closeModal(); saveData(); renderAll();
}
</script>
