  return `<div class="playoff-match">
    <div class="playoff-match-header" style="background:${color}99;">
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;">${label}</span>
        ${poLocked?`<span class="fecha-badge-locked" style="font-size:9px;">🔒 GUARDADO${currentRango===1?`<button onclick="unlockPlayoffMatch('${catId}','${phase}',${i})" style="background:transparent;border:1px solid rgba(255,255,255,.3);font-size:8px;padding:1px 5px;border-radius:2px;color:rgba(255,255,255,.7);cursor:pointer;margin-left:2px;">✎</button>`:''}
        </span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${dateDisplay}
        ${effectiveEditable?dateInput:''}
        ${effectiveEditable?timeInput:''}
        ${effectiveEditable?`<select class="cancha-select" onchange="setPlayoffCancha('${catId}','${phase}',${i},this.value)" title="Asignar cancha">
          <option value="" ${!m.cancha?'selected':''}>Cancha</option>
          <option value="1" ${m.cancha===1?'selected':''}>Cancha 1</option>
          <option value="2" ${m.cancha===2?'selected':''}>Cancha 2</option>
          <option value="3" ${m.cancha===3?'selected':''}>Cancha 3</option>
        </select>`:(m.cancha?`<span class="cancha-badge cancha-${m.cancha}">Cancha ${m.cancha}</span>`:'')}
        ${effectiveEditable?('<div style="display:flex;gap:3px;">'
        +'<button data-cat="'+catId+'" data-phase="'+phase+'" data-idx="'+i+'" data-side="home" onclick="setPlayoffWODirect(this.dataset.cat,this.dataset.phase,+this.dataset.idx,this.dataset.side)" style="font-size:9px;font-weight:700;padding:2px 5px;border:none;border-radius:2px;cursor:pointer;background:'+(m.walkover==='home'?'#e8001c':'rgba(255,255,255,.2)')+';color:#fff;">WO L</button>'
        +'<button data-cat="'+catId+'" data-phase="'+phase+'" data-idx="'+i+'" data-side="away" onclick="setPlayoffWODirect(this.dataset.cat,this.dataset.phase,+this.dataset.idx,this.dataset.side)" style="font-size:9px;font-weight:700;padding:2px 5px;border:none;border-radius:2px;cursor:pointer;background:'+(m.walkover==='away'?'#e8001c':'rgba(255,255,255,.2)')+';color:#fff;">WO V</button>'
        +'</div>'):('<span style="font-size:9px;color:rgba(255,255,255,.6);">'+(isWk?wkLabel:'')+'</span>')}

      </div>
    </div>
    <div class="playoff-match-body">
      <div style="text-align:right;">${hB}${homeCards}<span class="playoff-team home">${escHtml(m.home)}</span></div>
      <div class="playoff-score-wrap">
        <input class="playoff-score-input${m.played?' filled':''}" type="number" min="0" max="99" value="${hv}" placeholder="—"
          onchange="setPlayoffScore('${catId}','${phase}',${i},'home',this.value)" ${!effectiveEditable||isWk?'disabled':''}>
        <span class="playoff-score-sep">:</span>
        <input class="playoff-score-input${m.played?' filled':''}" type="number" min="0" max="99" value="${av}" placeholder="—"
          onchange="setPlayoffScore('${catId}','${phase}',${i},'away',this.value)" ${!effectiveEditable||isWk?'disabled':''}>
      </div>
      <div style="text-align:left;"><span class="playoff-team away">${escHtml(m.away)}</span>${awayCards}${aB}</div>
    </div>
    ${pensHtml}
    ${winnerBadge}
  </div>`;
}

function addPlayoffCard(catId,phase,idx,side,type){
  const m=state[catId].playoffs[phase][idx];
  if(!m.homeYellow) m.homeYellow=0;
  if(!m.homeRed) m.homeRed=0;
  if(!m.awayYellow) m.awayYellow=0;
  if(!m.awayRed) m.awayRed=0;
  const key=side==='home'?(type==='yellow'?'homeYellow':'homeRed'):(type==='yellow'?'awayYellow':'awayRed');
  m[key]++;
  renderAll();
}
function removePlayoffCard(catId,phase,idx,side,type,d){
  const m=state[catId].playoffs[phase][idx];
  const key=side==='home'?(type==='yellow'?'homeYellow':'homeRed'):(type==='yellow'?'awayYellow':'awayRed');
  if(m[key]>0) m[key]--;
  renderAll();
}
function setPlayoffDate(catId,phase,idx,val){
  state[catId].playoffs[phase][idx].matchDate=val;
  renderAll();
}
function setPlayoffTime(catId,phase,idx,val){
  state[catId].playoffs[phase][idx].matchTime=val;
  renderAll();
}

// ── FINAL SECTION ────────────────────────────────────────────
function renderFinalSection(container, cat, s){
  const color=cat.color;
  const catId=activeCat;
  window._fcat=catId; // global for onclick buttons
  const isEditable=currentRango===1&&!isVisitor;
  const po=s.playoffs;

  // ── Banner ────────────────────────────────────────────────
  let out='<div class="cat-banner" style="background:linear-gradient(135deg,'+color+','+color+'bb);">'
    +'<div class="cat-banner-icon">'+cat.icon+'</div>'
    +'<div class="cat-banner-info"><div class="cat-banner-title">Categoría '+cat.label+'</div>'
    +'<div class="cat-banner-sub">Fase de Eliminación · Fase Final</div></div>'
    +'<div class="cat-banner-equip" style="background:rgba(0,0,0,0.25);">'+getValidTeams(catId).length+' Equipos</div>'
    +'</div>';

  // ── Eliminacion ───────────────────────────────────────────
  try { out+=renderEliminacion(cat, s, catId); } 
  catch(e){ out+='<div style="padding:20px;color:red;">Error en fase de eliminación: '+e.message+'</div>'; }

  // ── Fase Final ────────────────────────────────────────────
  out+='<div style="margin-top:16px;">';
  try {
    const qf=po.quarterfinals||[];
    const sf=po.semifinals||[];
    const fin=po.final||[];
    const champion=fin.length>0?getWinner(fin[0]):null;
    const top8=getTop8(catId);
    const resetBtn=currentRango===1&&po.drawn
      ?'<button class="btn-reset-draw" onclick="resetDraw(window._fcat)">🔄 Reiniciar Fase Final</button>':'';

    // QF content
    let qfHtml='';
    if(!po.drawn){
      const qfBtn=isEditable
        ?'<p style="margin-bottom:12px;font-size:13px;color:#555;">Los <strong>'+top8.length+' equipos</strong> clasificados participarán en los 4tos de final.</p>'
          +'<button class="btn-draw btn-draw-qf" onclick="drawQuarterfinals(window._fcat)">⚡ Generar 4tos de Final (1°vs8° · 2°vs7° · 3°vs6° · 4°vs5°)</button>'
        :'<p style="font-size:13px;color:#aaa;">El sorteo de 4tos de final aún no ha sido realizado.</p>';
      qfHtml='<div class="playoff-empty-msg" style="padding:20px;">'+qfBtn+'</div>';
    } else {
      qfHtml=qf.map((m,i)=>renderPlayoffMatch(m,i,'quarterfinals',catId,color,isEditable,'Partido '+(i+1))).join('');
    }

    // SF content
    const allQFDone=qf.length>0&&qf.every(m=>getWinner(m));
    let sfHtml='';
    if(!allQFDone){
      sfHtml='<div class="playoff-tbd">⏳ Semifinales disponibles al terminar los 4tos</div>';
    } else if(sf.length===0){
      sfHtml='<div class="playoff-tbd">'+(isEditable?'<button class="btn-draw btn-draw-qf" style="background:#0066cc;color:#fff;" onclick="advanceSemifinals(window._fcat)">⚡ Generar Semifinales</button>':'⏳ Semifinales pendientes')+'</div>';
    } else {
      sfHtml=sf.map((m,i)=>renderPlayoffMatch(m,i,'semifinals',catId,color,isEditable,'Semifinal '+(i+1))).join('');
    }

    // Final content
    const allSFDone=sf.length>0&&sf.every(m=>getWinner(m));
    let finalHtml='';
    if(!allSFDone){
      finalHtml='<div class="playoff-tbd">⏳ Final disponible al terminar las semifinales</div>';
    } else if(fin.length===0){
      finalHtml='<div class="playoff-tbd">'+(isEditable?'<button class="btn-draw btn-draw-qf" style="background:#9b59b6;color:#fff;" onclick="advanceFinal(window._fcat)">⚡ Generar Final</button>':'⏳ Final pendiente')+'</div>';
    } else {
      finalHtml=fin.map((m,i)=>renderPlayoffMatch(m,i,'final',catId,color,isEditable,'Gran Final')).join('');
      if(champion){
        finalHtml+='<div class="champion-box"><div class="final-trophy">🏆</div>'
          +'<div class="champion-label">Campeón — Categoría '+cat.label+'</div>'
          +'<div class="champion-name">⭐ '+escHtml(champion)+' ⭐</div></div>';
      }
    }

    out+='<div class="playoff-section">'
      +'<div class="playoff-title" style="background:linear-gradient(135deg,'+color+','+color+'99);">'
      +'<div><div style="font-size:16px;">🏆 FASE FINAL — '+cat.label.toUpperCase()+'</div>'
      +'<div class="playoff-subtitle">Cuartos · Semifinales · Final</div></div>'+resetBtn+'</div>'
      +'<div class="playoff-bracket">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">'
      +'<div style="font-family:Oswald,sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:'+color+';border-left:4px solid '+color+';padding-left:8px;">⚽ Cuartos de Final</div>'
      +'<span style="font-family:Roboto Condensed,sans-serif;font-size:11px;color:#999;">1°vs8° · 2°vs7° · 3°vs6° · 4°vs5°</span>'
      
      +'</div>'
      +'<div class="playoff-matches">'+qfHtml+'</div>'
      +'<div style="border-top:2px solid #eee;margin:16px 0;"></div>'
      +'<div style="font-family:Oswald,sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:'+color+';border-left:4px solid '+color+';padding-left:8px;margin-bottom:12px;">🥈 Semifinales</div>'
      +'<div class="playoff-matches">'+sfHtml+'</div>'
      +'<div style="border-top:2px solid #eee;margin:16px 0;"></div>'
      +'<div style="font-family:Oswald,sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:'+color+';border-left:4px solid '+color+';padding-left:8px;margin-bottom:12px;">🏆 Gran Final</div>'
      +'<div class="playoff-matches">'+finalHtml+'</div>'
      +'</div></div>';
  } catch(e){
    out+='<div style="padding:20px;color:red;">Error en fase final: '+e.message+'</div>';
  }
  out+='</div>';
  container.innerHTML=out;
}

// ── WALKOVER DIRECT (no modal) ───────────────────────────────
function setWODirect(catId,fi,mi,side){
  const m=state[catId].fixture[fi].matches[mi];
  if(m.walkover===side){
    // Already set - remove WO
    m.walkover=false; m.played=false; m.homeGoals=null; m.awayGoals=null;
  } else {
    // Set WO
    m.walkover=side; m.played=true;
    m.homeGoals=side==='home'?3:0;
    m.awayGoals=side==='away'?3:0;
  }
  saveData(); renderAll();
}

function setElimWODirect(catId,idx,side){
  const m=state[catId].eliminacion.matches[idx];
  if(m.walkover===side){
    m.walkover=false; m.played=false; m.homeGoals=null; m.awayGoals=null;
  } else {
    m.walkover=side; m.played=true;
    m.homeGoals=side==='home'?3:0;
    m.awayGoals=side==='away'?3:0;
  }
  saveData(); renderAll();
}

function setPlayoffWODirect(catId,phase,idx,side){
  const m=state[catId].playoffs[phase][idx];
  if(m.walkover===side){
    m.walkover=false; m.played=false; m.homeGoals=null; m.awayGoals=null;
    m.hasPens=false; m.homePens=null; m.awayPens=null;
  } else {
    m.walkover=side; m.played=true;
    m.homeGoals=side==='home'?3:0;
    m.awayGoals=side==='away'?3:0;
    m.hasPens=false;
  }
  saveData(); renderAll();
}

// ── WALKOVER MODAL ────────────────────────────────────────────
function openWalkoverModal(catId,fi,mi){
  currentModalData={catId,fi,mi};
  const m=state[catId].fixture[fi].matches[mi];
  document.getElementById('modal-title').textContent='Walkover';
  document.getElementById('modal-body').innerHTML=`
    <p style="font-size:12px;color:#555;margin-bottom:12px;">El <strong>walkover</strong> otorga 3 puntos al equipo presente. Equipo ausente recibe 0.</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:2px solid ${m.walkover==='home'?'var(--red)':'var(--border)'};border-radius:3px;" onclick="selWO('home')">
        <input type="radio" name="wo" value="home" ${m.walkover==='home'?'checked':''}> <strong style="font-family:'Roboto Condensed';text-transform:uppercase;">${escHtml(m.home)}</strong> <span style="font-size:11px;color:#666;">gana por W/O (+3 pts)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:2px solid ${m.walkover==='away'?'var(--red)':'var(--border)'};border-radius:3px;" onclick="selWO('away')">
        <input type="radio" name="wo" value="away" ${m.walkover==='away'?'checked':''}> <strong style="font-family:'Roboto Condensed';text-transform:uppercase;">${escHtml(m.away)}</strong> <span style="font-size:11px;color:#666;">gana por W/O (+3 pts)</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px;border:2px solid var(--border);border-radius:3px;" onclick="selWO('none')">
        <input type="radio" name="wo" value="none" ${!m.walkover?'checked':''}> <span style="font-size:12px;color:#555;">Sin walkover (partido normal)</span>
      </label>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function selWO(v){document.querySelectorAll('input[name="wo"]').forEach(r=>r.checked=(r.value===v));}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function confirmModal(){
  const val=document.querySelector('input[name="wo"]:checked')?.value;
  // ── Playoff WO ──
  if(currentModalData.type==='playoff'){
    setPlayoffWO(currentModalData.catId, currentModalData.phase, currentModalData.idx, val);
    return;
  }
  // ── Eliminacion WO ──
  if(currentModalData.type==='elim'){
    const m=state[currentModalData.catId].eliminacion.matches[currentModalData.idx];
    if(!val||val==='none'){m.walkover=false;m.played=false;m.homeGoals=null;m.awayGoals=null;}
    else{m.walkover=val;m.played=true;if(val==='home'){m.homeGoals=3;m.awayGoals=0;}else{m.homeGoals=0;m.awayGoals=3;}}
    closeModal(); saveData(); renderAll();
    return;
  }
  // ── Fixture WO ──
  const{catId,fi,mi}=currentModalData;
  const m=state[catId].fixture[fi].matches[mi];
  if(!val||val==='none'){m.walkover=false;m.played=false;m.homeGoals=null;m.awayGoals=null;}
  else{m.walkover=val;m.played=true;if(val==='home'){m.homeGoals=3;m.awayGoals=0;}else{m.homeGoals=0;m.awayGoals=3;}}
  closeModal(); saveData(); renderAll();
}
</script>
