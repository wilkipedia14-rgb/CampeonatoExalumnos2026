<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Campeonato de Exalumnos Franciscanos</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --red:#e8001c;--dark-red:#b50015;--black:#0d0d0d;--dark-gray:#1a1a1a;
  --light-gray:#f2f2f2;--border:#e0e0e0;--text-main:#1a1a1a;--text-muted:#666;
  --green-top8:#d4edda;--green-top8-text:#155724;--white:#fff;
  --accent-yellow:#ffd700;--orange:#ff8c00;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:var(--light-gray);color:var(--text-main);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0d0d0d 60%,#1a0005);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;}
.login-box{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.login-emblem{text-align:center;margin-bottom:10px;}
.login-emblem img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--red);}
.login-title{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;color:#fff;text-align:center;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.login-subtitle{font-family:'Roboto Condensed',sans-serif;font-size:11px;color:#888;text-align:center;text-transform:uppercase;letter-spacing:1px;margin-bottom:26px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:5px;}
.login-field input{width:100%;padding:11px 14px;background:#111;border:1px solid #444;border-radius:4px;color:#fff;font-family:'Roboto',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
.login-field input:focus{border-color:var(--red);}
.login-btn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:4px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;margin-top:6px;transition:background .15s;}
.login-btn:hover{background:var(--dark-red);}
.login-error{color:#ff6b6b;font-size:12px;text-align:center;margin-top:10px;display:none;}
.visitor-btn{width:100%;padding:13px;background:#0066cc;color:#fff;border:none;border-radius:4px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;margin-top:10px;transition:background .15s;}
.visitor-btn:hover{background:#0052a3;}

/* ── TOAST ── */
#save-toast{position:fixed;bottom:20px;right:20px;background:#198754;color:#fff;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:11px 18px;border-radius:4px;z-index:8000;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#save-toast.show{opacity:1;}

/* ── HEADER ── */
.site-header{background:var(--black);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:1000;overflow:visible;}
.header-top{background:var(--red);padding:4px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.header-top-left{font-family:'Roboto Condensed',sans-serif;font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;}
.header-top-date{font-family:'Roboto Condensed',sans-serif;font-size:11px;color:rgba(255,255,255,.85);}
.header-main{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:10px;flex-wrap:wrap;}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-emblem{width:46px;height:46px;border-radius:50%;overflow:hidden;border:2px solid #fff;flex-shrink:0;}
.logo-emblem img{width:100%;height:100%;object-fit:cover;}
.logo-text h1{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px;line-height:1.2;}
.logo-text span{font-family:'Roboto Condensed',sans-serif;font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:2px;}
/* header-badge hidden in header, now shown in cat-banner */
.header-badge{display:none;}

/* ── NAV TOP (categories) ── */
.cat-nav{background:#111;display:flex;align-items:center;border-bottom:1px solid #2a2a2a;overflow:visible;flex-shrink:0;}
.cat-btn{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:#888;background:none;border:none;padding:10px 20px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;flex-shrink:0;display:flex;align-items:center;gap:7px;}
.cat-btn:hover{color:#ddd;}
.cat-btn.active{color:#fff;border-bottom-color:var(--cat-color,var(--red));background:rgba(255,255,255,.04);}
.cat-btn .cat-dot{width:8px;height:8px;border-radius:50%;background:var(--cat-color,var(--red));flex-shrink:0;}

/* ── NAV BOTTOM (sections + actions) ── */
.main-nav{background:var(--dark-gray);display:flex;align-items:center;border-top:1px solid #333;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:wrap;}
.nav-actions{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--dark-gray);border-top:1px solid #2a2a2a;flex-shrink:0;}
.nav-tab{font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;color:#ccc;background:none;border:none;padding:11px 15px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;flex-shrink:0;}
.nav-tab:hover{color:#fff;border-bottom-color:var(--red);}
.nav-tab.active{color:#fff;border-bottom-color:var(--red);background:rgba(232,0,28,.1);}
.nav-spacer{flex:1;}
.btn-nav-save{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:7px 18px;border:none;border-radius:3px;cursor:pointer;background:#198754;color:#fff;margin:4px 6px 4px 0;flex-shrink:0;transition:all .2s;box-shadow:0 0 10px rgba(25,135,84,.5);border:1px solid #25a96a;}
.btn-nav-save:hover{background:#146c43;box-shadow:0 0 16px rgba(25,135,84,.8);transform:translateY(-1px);}
.btn-nav-logout{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 12px;border:none;border-radius:3px;cursor:pointer;background:var(--orange);color:#fff;margin:5px 8px 5px 0;flex-shrink:0;transition:background .15s;}
.btn-nav-logout:hover{background:#cc7000;}

/* ── LAYOUT ── */
.container{max-width:1200px;margin:0 auto;padding:14px 12px;}
.section-title{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--black);border-left:5px solid var(--red);padding-left:12px;margin-bottom:14px;}
.tab-content{display:none;}.tab-content.active{display:block;}

/* ── CATEGORY BANNER ── */
.cat-banner{border-radius:4px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;color:#fff;}
.cat-banner-icon{font-size:26px;flex-shrink:0;}
.cat-banner-info{flex:1;}
.cat-banner-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;line-height:1;}
.cat-banner-sub{font-family:'Roboto Condensed',sans-serif;font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.cat-banner-equip{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;padding:7px 18px;border-radius:3px;white-space:nowrap;flex-shrink:0;border:2px solid rgba(255,255,255,0.4);}

/* ── CARD ── */
.card{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:14px;}
.card-header{background:var(--black);color:#fff;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.card-body{padding:12px;}

/* ── TEAMS ── */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:7px;margin-bottom:12px;}
.team-item{display:flex;align-items:center;gap:7px;background:var(--light-gray);border:1px solid var(--border);border-radius:3px;padding:7px 9px;}
.team-number{font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:var(--red);width:18px;text-align:center;flex-shrink:0;}
.team-name-input{flex:1;border:none;background:transparent;font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text-main);outline:none;text-transform:uppercase;min-width:0;}
.team-name-input::placeholder{color:#bbb;font-weight:400;text-transform:none;}
.team-name-input:focus{border-bottom:2px solid var(--red);}
.btn-remove-team{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.btn-remove-team:hover{color:var(--red);}

/* ── BUTTONS ── */
.btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:9px 16px;border:none;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--red);color:#fff;}.btn-primary:hover{background:var(--dark-red);}
.btn-secondary{background:var(--black);color:#fff;}.btn-secondary:hover{background:#333;}
.btn-outline{background:transparent;border:2px solid var(--red);color:var(--red);}.btn-outline:hover{background:var(--red);color:#fff;}
.btn-sm{padding:5px 11px;font-size:10px;}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:10px;}

/* ── STATUS BAR ── */
.status-bar{background:linear-gradient(135deg,var(--black),var(--dark-gray));color:#fff;border-radius:4px;padding:11px 14px;display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.stat-item{text-align:center;flex:1;min-width:55px;}
.stat-value{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--red);line-height:1;}
.stat-label{font-family:'Roboto Condensed',sans-serif;font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* ── FIXTURE ── */
.fixture-fecha{background:#fff;border:1px solid var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden;}
.fecha-header{background:var(--black);color:#fff;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:6px;flex-wrap:wrap;}
.fecha-header:hover{background:#1e1e1e;}
.fecha-title{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fecha-date-str{color:#bbb;font-size:11px;font-weight:400;}
.fecha-badge{background:var(--red);font-size:10px;padding:2px 6px;border-radius:2px;}
.fecha-postponed-badge{background:var(--orange);font-size:10px;padding:2px 6px;border-radius:2px;}
.fecha-controls{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.fecha-date-input{font-family:'Roboto Condensed',sans-serif;font-size:10px;background:#333;border:1px solid #555;color:#fff;padding:2px 4px;border-radius:3px;cursor:pointer;width:88px !important;min-width:0 !important;max-width:88px !important;}
.fecha-body{padding:0;}.fecha-body.collapsed{display:none;}
.toggle-icon{transition:transform .2s;font-size:10px;}
.collapsed-header .toggle-icon{transform:rotate(-90deg);}
.fecha-postponed-overlay{background:#fff3cd;border-bottom:2px solid #ffc107;padding:7px 12px;font-family:'Roboto Condensed',sans-serif;font-size:11px;color:#856404;display:flex;align-items:center;gap:6px;}

/* ── FIXTURE TABLE ── */
.fixture-table{width:100%;border-collapse:collapse;table-layout:auto;}
.fixture-table thead tr{background:var(--black);}
.fixture-table th{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#ccc;text-align:center;white-space:nowrap;border:none;padding:9px 0;}
.fixture-table thead th.col-np{width:36px;padding:9px 4px 9px 4px;text-align:center;color:var(--red);}
.fixture-table thead th.col-hora{width:90px;padding:9px 2px 9px 2px;text-align:left;color:var(--orange);}
.fixture-table thead th.col-local{padding:9px 6px 9px 14px;text-align:right;}
.fixture-table thead th.col-marcador{width:90px;padding:9px 6px;text-align:center;}
.fixture-table thead th.col-visita{padding:9px 6px;text-align:left;}
.fixture-table thead th.col-wo{width:52px;padding:9px 10px 9px 4px;text-align:center;}
.fixture-table thead th.col-hora{border-right:1px solid #444;}
.fixture-table thead th.col-visita{border-right:1px solid #444;}
.fixture-table tbody tr{border-bottom:1px solid #eee;transition:background .1s;}
.fixture-table tbody tr:hover{background:#fafafa;}
.fixture-table tbody tr.played-row{background:#f0faf4;}
.fixture-table tbody tr.rest-tr td{background:#e8f0fe;color:#1a56db;text-align:center;font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;padding:10px;text-transform:uppercase;border:none;}
.fixture-table td{padding:0;border:none;vertical-align:middle;}
.td-np{width:36px;text-align:center;padding:7px 4px 7px 4px;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:var(--red);}
.td-hora{width:90px;white-space:nowrap;padding:7px 2px 7px 2px;border-right:1px solid #eee;}
.time-display{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:var(--orange);display:block;line-height:1.1;}
.time-edit input[type="time"]{width:72px;padding:2px 3px;font-size:10px;border:1px solid #ddd;border-radius:2px;background:#fff;color:#666;cursor:pointer;outline:none;margin-top:2px;display:block;}
.time-edit input[type="time"]:focus{border-color:var(--orange);}
.td-local{text-align:right;white-space:nowrap;padding:7px 6px 7px 16px;}
.td-marcador{width:90px;text-align:center;padding:7px 4px;}
.td-visita{text-align:left;white-space:nowrap;padding:7px 10px 7px 6px;border-right:1px solid #eee;}
.td-wo{width:52px;text-align:center;padding:7px 10px 7px 4px;}
.team-name-cell{font-family:'Roboto Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:var(--text-main);white-space:nowrap;}
.score-wrapper{display:flex;align-items:center;justify-content:center;gap:3px;}
.score-input{width:34px;height:32px;text-align:center;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;border:2px solid var(--border);border-radius:3px;background:#fff;color:var(--black);outline:none;transition:border-color .15s;}
.score-input:focus{border-color:var(--red);}
.score-input.filled{border-color:#bbb;background:#f5f5f5;}
.score-input:disabled{background:#eee;color:#aaa;cursor:not-allowed;}
.score-sep{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:#aaa;padding:0 2px;}
.result-badge{font-size:9px;font-family:'Roboto Condensed',sans-serif;font-weight:700;padding:2px 4px;border-radius:2px;text-transform:uppercase;margin:0 3px;vertical-align:middle;}
.badge-win{background:#d4edda;color:#155724;}.badge-draw{background:#fff3cd;color:#856404;}.badge-loss{background:#f8d7da;color:#721c24;}
.walkover-btn{font-family:'Roboto Condensed',sans-serif;font-size:9px;font-weight:700;background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:3px 5px;border-radius:2px;cursor:pointer;text-transform:uppercase;white-space:nowrap;letter-spacing:.3px;}
.walkover-btn.active-wk{background:#ffc107;color:#333;}

/* ── STANDINGS ── */
.standings-table{width:100%;border-collapse:collapse;font-size:14px;}
.standings-table thead tr{background:var(--black);color:#fff;}
.standings-table th{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:9px 6px;text-align:center;white-space:nowrap;border-right:1px solid #333;}
.standings-table th:last-child{border-right:none;}
.standings-table th.th-equipo{text-align:left;padding-left:10px;min-width:120px;}
.standings-table td{padding:8px 6px;text-align:center;border-bottom:1px solid #f0f0f0;border-right:1px solid #f0f0f0;}
.standings-table td:last-child{border-right:none;}
.standings-table td.td-equipo{text-align:left;padding-left:10px;font-family:'Roboto Condensed',sans-serif;font-weight:700;text-transform:uppercase;font-size:14px;}
.standings-table tbody tr:hover{background:#f5f5f5;}
.standings-table tbody tr.top8{background:var(--green-top8);}
.standings-table tbody tr.top8:hover{background:#c3e6cb;}
.standings-table tbody tr.top8 td{color:var(--green-top8-text);}
.standings-table tbody tr.top8-last td{border-bottom:2px solid #198754;}
.pos-number{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:var(--text-muted);width:28px;}
.top8 .pos-number{color:#155724;}
.pts-cell{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;color:var(--black);}
.top8 .pts-cell{color:#155724;}
.classification-badge{font-size:9px;font-family:'Roboto Condensed',sans-serif;font-weight:700;background:#198754;color:#fff;padding:1px 5px;border-radius:2px;margin-left:4px;text-transform:uppercase;vertical-align:middle;}
.top8-note{background:var(--green-top8);border:1px solid #b8dacc;border-radius:3px;padding:7px 12px;font-family:'Roboto Condensed',sans-serif;font-size:12px;color:var(--green-top8-text);margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:8px;}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);}
.legend-color{width:11px;height:11px;border-radius:2px;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;align-items:center;justify-content:center;padding:14px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:4px;width:100%;max-width:450px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.modal-header{background:var(--black);color:#fff;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.modal-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.modal-body{padding:14px;}
.modal-footer{padding:11px 14px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;}

/* ── FORM ── */
input[type="text"],input[type="date"],input[type="time"]{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:3px;font-family:'Roboto',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
input[type="text"]:focus,input[type="date"]:focus,input[type="time"]:focus{border-color:var(--red);}
.form-label{display:block;font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:4px;}
.form-group{margin-bottom:10px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.alert{padding:9px 12px;border-radius:3px;font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:7px;line-height:1.4;}
.alert-info{background:#d1ecf1;border-left:4px solid #17a2b8;color:#0c5460;}
.no-teams-msg{text-align:center;padding:32px 20px;color:var(--text-muted);font-family:'Roboto Condensed',sans-serif;font-size:14px;}
.no-teams-msg .big-icon{font-size:42px;margin-bottom:10px;}

/* ── RANGO 2 MODE (no equipos edit) ── */


/* ── VISITOR MODE ── */
.visitor-mode .visitor-hidden { display: none !important; }
.visitor-mode #config-card { display: none !important; }
.visitor-mode .fecha-controls { display: none !important; }
.visitor-mode .time-edit { display: none !important; }
.visitor-mode .walkover-btn { display: none !important; }
.visitor-mode .btn-row { display: none !important; }
.visitor-mode .container .btn-outline { display: none !important; }
.visitor-mode .container .btn-secondary { display: none !important; }
.visitor-mode .container .btn-primary { display: none !important; }
.visitor-mode .score-input { pointer-events:none !important; background:#f5f5f5 !important; color:#444 !important; border-color:#e0e0e0 !important; cursor:default !important; }
.visitor-mode .fecha-date-input { display: none !important; }
.visitor-mode .team-name-input { pointer-events:none !important; }
.visitor-mode .btn-nav-save { display: none !important; }
.visitor-mode .btn-nav-logout { display: none !important; }

/* ── PLAYOFFS ── */
.playoff-section{margin-top:20px;}
.playoff-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;padding:10px 16px;border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.playoff-subtitle{font-family:'Roboto Condensed',sans-serif;font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.playoff-bracket{background:#fff;border:1px solid var(--border);border-radius:0 0 4px 4px;padding:14px;}
.playoff-matches{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:10px;}
.playoff-match{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;}
.playoff-match-header{padding:5px 12px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;display:flex;align-items:center;justify-content:space-between;}
.playoff-match-body{padding:10px 12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.playoff-team{font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.playoff-team.home{text-align:right;}
.playoff-team.away{text-align:left;}
.playoff-score-wrap{display:flex;align-items:center;justify-content:center;gap:4px;}
.playoff-score-input{width:36px;height:34px;text-align:center;font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;border:2px solid var(--border);border-radius:3px;background:#fff;color:var(--black);outline:none;transition:border-color .15s;}
.playoff-score-input:focus{border-color:var(--red);}
.playoff-score-input.filled{border-color:#bbb;background:#f0f0f0;}
.playoff-score-input:disabled{background:#eee;color:#999;cursor:not-allowed;}
.playoff-score-sep{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:#aaa;}
.playoff-wo-btn{font-family:'Roboto Condensed',sans-serif;font-size:9px;font-weight:700;background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:3px 6px;border-radius:2px;cursor:pointer;text-transform:uppercase;}
.playoff-wo-btn.active-wk{background:#ffc107;color:#333;}
.playoff-match-footer{padding:5px 12px 8px;text-align:center;font-family:'Roboto Condensed',sans-serif;font-size:11px;color:#888;}
.playoff-winner{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;padding:8px 18px;border-radius:4px;display:inline-block;letter-spacing:1px;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.playoff-tbd{font-family:'Roboto Condensed',sans-serif;font-size:12px;color:#aaa;text-align:center;padding:16px;font-style:italic;}
.playoff-result-badge{font-size:9px;font-family:'Roboto Condensed',sans-serif;font-weight:700;padding:2px 5px;border-radius:2px;text-transform:uppercase;margin:0 3px;vertical-align:middle;}
.playoff-empty-msg{text-align:center;padding:20px;color:#aaa;font-family:'Roboto Condensed',sans-serif;font-size:13px;}
.btn-draw{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:6px 14px;border:none;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-draw-qf{background:var(--accent-yellow);color:#333;}
.btn-draw-qf:hover{background:#e6c200;}
.btn-reset-draw{background:#555;color:#fff;font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;padding:4px 10px;border:none;border-radius:3px;cursor:pointer;}
.btn-reset-draw:hover{background:#333;}
.final-trophy{font-size:48px;text-align:center;padding:10px 0;}
.champion-box{background:linear-gradient(135deg,#ffd700,#ffaa00);border-radius:6px;padding:14px 20px;text-align:center;margin-top:10px;}
.champion-name{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;text-transform:uppercase;color:#333;letter-spacing:1px;}
.champion-label{font-family:'Roboto Condensed',sans-serif;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}

/* ── CARDS DOT SYSTEM ── */
.cards-wrap{display:inline-flex;align-items:center;gap:2px;vertical-align:middle;margin:0 3px;flex-shrink:0;}
/* Pending dots - small circles */
.card-dot{width:7px;height:7px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:all .15s;}
.card-dot.dot-pending-y{background:rgba(255,193,7,.25);border:1.5px dashed #ffc107;}
.card-dot.dot-pending-y:hover{background:rgba(255,193,7,.6);transform:scale(1.3);}
.card-dot.dot-pending-r{background:rgba(220,53,69,.2);border:1.5px dashed #dc3545;}
.card-dot.dot-pending-r:hover{background:rgba(220,53,69,.5);transform:scale(1.3);}
/* Active cards - rectangular vertical like real cards */
.card-active{display:inline-block;width:8px;height:11px;border-radius:1px;cursor:pointer;flex-shrink:0;transition:all .15s;border:1px solid rgba(0,0,0,.2);vertical-align:middle;}
.card-active.card-y{background:#ffc107;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.card-active.card-y:hover{background:#e6a800;transform:scale(1.15);}
.card-active.card-r{background:#dc3545;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.card-active.card-r:hover{background:#b02a37;transform:scale(1.15);}
/* Badge in fecha header */
.fecha-cards-badge{font-family:'Roboto Condensed',sans-serif;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:2px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;white-space:nowrap;}

/* ── LOCK SYSTEM ── */
.fecha-badge-lock{background:#198754;font-size:10px;padding:2px 8px;border-radius:2px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.5px;cursor:pointer;border:none;color:#fff;transition:all .15s;}
.fecha-badge-lock:hover{background:#146c43;}
.fecha-badge-locked{background:#198754;font-size:10px;padding:2px 8px;border-radius:2px;font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.5px;color:#fff;display:inline-flex;align-items:center;gap:4px;}
.fecha-badge-unlock{background:transparent;border:1px solid rgba(255,255,255,.3);font-size:9px;padding:1px 6px;border-radius:2px;font-family:'Oswald',sans-serif;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;display:none;}
.fecha-badge-unlock:hover{background:rgba(255,255,255,.1);color:#fff;}
/* Show unlock only for rango1 */
.rango1-visible{display:none;}

/* ── ELIMINACION ── */
.elim-section{margin-top:4px;}
.elim-header{border-radius:4px 4px 0 0;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.elim-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;}
.elim-sub{font-family:'Roboto Condensed',sans-serif;font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.elim-body{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;padding:14px;}
.elim-matches{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;}
.elim-match{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;}
.elim-match-header{padding:6px 12px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.elim-match-body{padding:10px 12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.elim-team{font-family:'Roboto Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.elim-team.home{text-align:right;}.elim-team.away{text-align:left;}
.elim-score-wrap{display:flex;align-items:center;justify-content:center;gap:4px;}
.elim-score-input{width:36px;height:34px;text-align:center;font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;border:2px solid var(--border);border-radius:3px;background:#fff;color:var(--black);outline:none;transition:border-color .15s;}
.elim-score-input:focus{border-color:var(--red);}
.elim-score-input.filled{border-color:#bbb;background:#f0f0f0;}
.elim-match-body{border-left:3px solid transparent;}
.elim-score-input:disabled{background:#eee;color:#999;cursor:not-allowed;}
.elim-score-sep{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:#aaa;}
.elim-winner{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;padding:7px 16px;border-radius:3px;display:inline-block;letter-spacing:1px;}
.elim-bye{text-align:center;padding:10px;font-family:'Roboto Condensed',sans-serif;font-size:12px;color:#888;background:#f5f5f5;border-radius:3px;margin:8px;}
.elim-wo-btn{font-family:'Roboto Condensed',sans-serif;font-size:9px;font-weight:700;background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:3px 6px;border-radius:2px;cursor:pointer;text-transform:uppercase;}
.elim-wo-btn.active-wk{background:#ffc107;color:#333;}
.elim-lock-btn{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border:none;border-radius:2px;cursor:pointer;background:#198754;color:#fff;}
.elim-locked-badge{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;color:#fff;background:#198754;padding:2px 8px;border-radius:2px;display:inline-flex;align-items:center;gap:4px;}

/* ── CANCHAS ── */
.cancha-badge{display:inline-block;font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:2px;color:#fff;white-space:nowrap;}
.cancha-1{background:#c0392b;}
.cancha-2{background:#2980b9;}
.cancha-3{background:#27ae60;}
.td-cancha{width:90px;text-align:center;padding:4px;}
.cancha-select{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;background:#333;border:1px solid #666;color:#fff;padding:3px 5px;border-radius:3px;cursor:pointer;text-transform:uppercase;}

/* ── CAT DROPDOWN ── */
.cat-dropdown-wrap{position:relative;}
.cat-dropdown-btn{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fff;border:none;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:opacity .15s;}
.cat-dropdown-btn:hover{opacity:.85;}
.cat-dropdown-menu{display:none;position:absolute;top:100%;left:0;z-index:999;background:#111;border:1px solid #333;border-top:none;min-width:180px;box-shadow:0 4px 12px rgba(0,0,0,.4);}
.cat-dropdown-menu.open{display:block;}
.cat-dropdown-item{display:block;width:100%;text-align:left;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#ccc;background:transparent;border:none;border-left:4px solid transparent;padding:10px 14px;cursor:pointer;transition:background .1s;}
.cat-dropdown-item:hover{background:#222;color:#fff;}
.cat-dropdown-item.active{color:#fff;background:#1a1a1a;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--light-gray);}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .teams-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  .fixture-table{table-layout:auto;}
  .team-name-cell{font-size:12px;}
  .time-display{font-size:13px;}
  .cat-btn{padding:9px 13px;font-size:11px;}
}
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr;}
  .logo-text h1{font-size:13px;}
  .logo-emblem{width:36px;height:36px;}
  .header-main{padding:8px 10px;}
  .score-input{width:28px;height:28px;font-size:13px;}
  .time-display{font-size:12px;}
  .btn-nav-save,.btn-nav-logout{padding:5px 10px;font-size:10px;}
  .team-name-cell{font-size:11px;}
  .fixture-table th,.fixture-table td{padding:4px 3px;}
  .walkover-btn{font-size:8px;padding:2px 4px;}
  .cat-btn{padding:8px 11px;font-size:10px;}
  .cat-banner-title{font-size:16px;}
}
@media(max-width:480px){
  .main-nav{flex-wrap:wrap;}
  .cat-nav{flex-wrap:wrap;}
  .btn-nav-save,.btn-nav-logout{
    padding:5px 8px;
    font-size:10px;
    letter-spacing:.3px;
    margin:3px 2px;
  }
}
@media(max-width:420px){
  .nav-tab{padding:10px 10px;font-size:11px;}
  .fixture-table{font-size:10px;}
  .team-name-cell{font-size:10px;}
  .time-display{font-size:11px;}
  .score-input{width:24px;height:24px;font-size:12px;}
  .btn-nav-save,.btn-nav-logout{padding:5px 10px;font-size:10px;}
}
</style>

<script>
// ── CATEGORIES CONFIG ─────────────────────────────────────────
const CATEGORIES = [
  {id:'menores',    label:'Menores',     icon:'👦', color:'#e8001c'},
  {id:'medianos',   label:'Medianos',    icon:'🧑', color:'#0066cc'},
  {id:'mayores',    label:'Mayores',     icon:'👨', color:'#198754'},
  {id:'supermaster',label:'Super Master',icon:'🏅', color:'#9b59b6'},
];

// ── STATE (per category) ──────────────────────────────────────
// state[catId] = { teams[], fixture[], postponed{}, startDate, matchTime, matchDuration, matchInterval }
let state = {};
CATEGORIES.forEach(c => {
  state[c.id] = { teams:[], fixture:[], postponed:{}, startDate:'2026-06-20', matchTime:'13:00', matchDuration:'50', matchInterval:'5',
    lockedFechas:{},
    lockedPlayoffs:{},
    eliminacion:{
      matches:[],
      generated:false,
      locked:{},
      bestLoserSelected:null  // manually selected best loser team name
    },
    playoffs:{ 
      quarterfinals:[],
      semifinals:[],
      final:[],
      drawn:false
    }
  };
});

let activeCat = 'menores';
let activeSection = 'equipos';
let currentModalData = {};

// ── USUARIOS ─────────────────────────────────────────────────
// RANGO 1: acceso total
// RANGO 2: acceso total excepto funciones dentro de pestaña Equipos
// VISITANTE: solo lectura
const USERS = [
  { user:'admin', pass:'arges1984*/2001', rango:1 },
];
let isVisitor = false;
let currentRango = 0; // 0=none, 1=admin, 2=rango2
// ── AUTH ──────────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const found=USERS.find(x=>x.user===u&&x.pass===p);
  if(found){
    isVisitor=false;
    currentRango=found.rango;
    document.getElementById('login-screen').style.display='none';
    const app=document.getElementById('app');
    app.style.display='block';
    app.classList.remove('visitor-mode');
    // Reset only specific elements that visitor mode might have hidden
    const saveBtn=document.querySelector('.btn-nav-save');
    const logoutBtn=document.querySelector('.btn-nav-logout');
    if(saveBtn) saveBtn.style.display='';
    if(logoutBtn) logoutBtn.style.display='';
    // Reset modal buttons specifically
    document.querySelectorAll('.modal-btn').forEach(el=>{ el.style.display=''; });
    // Reset score inputs
    document.querySelectorAll('.score-input,.playoff-score-input').forEach(el=>{ el.style.display=''; el.style.pointerEvents=''; el.style.background=''; el.style.color=''; el.style.border=''; el.disabled=false; });
    // Reset team name inputs
    document.querySelectorAll('.team-name-input').forEach(el=>{ el.style.pointerEvents=''; el.disabled=false; });
    document.getElementById('visitor-badge')?.remove();
    document.getElementById('exit-visitor-btn')?.remove();
    document.getElementById('rango-badge')?.remove();

    // Show logout button and admin badge
    const logoutMainBtn=document.getElementById('btn-logout-main');
    if(logoutMainBtn) logoutMainBtn.style.display='';
    setTimeout(()=>showRangoBadge(found), 100);
    loadData();
  } else {
    document.getElementById('login-error').style.display='block';
  }
}
function doVisitor(){
  isVisitor=true;
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');
  app.style.display='block';
  app.classList.add('visitor-mode');
  buildCatNav();
  // Show loading message while Firebase loads
  const container=document.getElementById('main-container');
  if(container) container.innerHTML='<div style="text-align:center;padding:40px;font-family:Roboto Condensed,sans-serif;color:#aaa;font-size:14px;">⏳ Cargando datos...</div>';
  startVisitorSync(); // loads from Firebase and renders when ready
}

function startVisitorSync(){
  if(!db){ buildCatNav(); renderAll(); setTimeout(applyVisitorMode,0); return; }
  db.ref(DB_REF+'/data').on('value', snapshot=>{
    const jsonStr=snapshot.val();
    if(!jsonStr){
      buildCatNav(); renderAll(); setTimeout(applyVisitorMode,0);
      return;
    }
    try{
      const saved=JSON.parse(jsonStr);
      CATEGORIES.forEach(c=>{
        if(saved[c.id]) state[c.id]={...state[c.id],...saved[c.id]};
      });
      buildCatNav();
      renderAll();
      setTimeout(applyVisitorMode, 0);
    } catch(e){
      console.error('Visitor sync error:',e);
      buildCatNav(); renderAll(); setTimeout(applyVisitorMode,0);
    }
  });
}

function showRangoBadge(user){
  document.getElementById('rango-badge')?.remove();
  const nav=document.querySelector('.main-nav');
  if(!nav) return;
  const badge=document.createElement('button');

function normalizeState(){
  // Firebase converts arrays to objects - convert back to arrays
  CATEGORIES.forEach(c=>{
    const s=state[c.id];
    // Normalize fixture array
    if(s.fixture&&!Array.isArray(s.fixture)){
      s.fixture=Object.values(s.fixture);
    }
    if(s.fixture){
      s.fixture.forEach(fecha=>{
        if(fecha.matches&&!Array.isArray(fecha.matches)){
          fecha.matches=Object.values(fecha.matches);
        }
      });
    }
    // Normalize teams array
    if(s.teams&&!Array.isArray(s.teams)){
      s.teams=Object.values(s.teams);
    }
    // Normalize eliminacion matches
    if(s.eliminacion&&s.eliminacion.matches&&!Array.isArray(s.eliminacion.matches)){
      s.eliminacion.matches=Object.values(s.eliminacion.matches);
    }
    // Normalize playoffs
    ['quarterfinals','semifinals','final'].forEach(phase=>{
      if(s.playoffs&&s.playoffs[phase]&&!Array.isArray(s.playoffs[phase])){
        s.playoffs[phase]=Object.values(s.playoffs[phase]);
      }
    });
  });
}

function loadData(){
  // Always load from Firebase (source of truth)
  if(!db){
    // Firebase not available - use localStorage
    const raw=localStorage.getItem('franciscanos_v5');
    if(raw){ try{ const saved=JSON.parse(raw); CATEGORIES.forEach(c=>{ if(saved[c.id]) state[c.id]={...state[c.id],...saved[c.id]}; }); buildCatNav(); renderAll(); } catch(e){} }
    return;
  }
  db.ref(DB_REF+'/data').once('value').then(snapshot=>{
    const jsonStr=snapshot.val();
    if(!jsonStr) return;
    try{
      const saved=JSON.parse(jsonStr);
      CATEGORIES.forEach(c=>{
        if(saved[c.id]) state[c.id]={...state[c.id],...saved[c.id]};
      });
      localStorage.setItem('franciscanos_v5', jsonStr); // cache locally
      buildCatNav();
      renderAll();
      if(isVisitor) setTimeout(applyVisitorMode, 0);
    } catch(e){ console.error('Parse error:',e); }
  }).catch(e=>{
    // If Firebase fails, try localStorage as fallback
    console.error('Firebase load error:',e);
    const raw=localStorage.getItem('franciscanos_v5');
    if(raw){
      try{
        const saved=JSON.parse(raw);
        CATEGORIES.forEach(c=>{
          if(saved[c.id]) state[c.id]={...state[c.id],...saved[c.id]};
        });
        buildCatNav();
        renderAll();
        if(isVisitor) setTimeout(applyVisitorMode, 0);
      } catch(e2){}
    }
  });
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function addDays(d,days){const dt=new Date(d);dt.setDate(dt.getDate()+days);return dt;}
function formatDate(d){return d.toISOString().split('T')[0];}
function formatDisplayDate(str){
  if(!str)return'';
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const d=new Date(str+'T12:00:00');
  return`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function to12h(t24){
  if(!t24)return'';
  const[hS,mS]=t24.split(':'); let h=parseInt(hS),m=parseInt(mS);
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  return`${h}:${String(m).padStart(2,'0')} ${ap}`;
}
function addMinutes(t24,mins){
  const[hS,mS]=t24.split(':');
  let total=parseInt(hS)*60+parseInt(mS)+mins;
  total=((total%1440)+1440)%1440;
  return`${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}
function computeMatchTimes(n, catId){
  const s=state[catId];
  const base=s.matchTime||'13:00';
  const dur=parseInt(s.matchDuration)||50;
  const intv=parseInt(s.matchInterval)||5;
  const step=dur+intv; const times=[]; let cur=base;
  for(let i=0;i<n;i++){times.push(cur);cur=addMinutes(cur,step);}
  return times;
}

// ── FIXTURE GENERATION ────────────────────────────────────────
function generateFixture(catId){
  const valid=getValidTeams(catId);
  if(valid.length<2){alert('Necesitas al menos 2 equipos.');return;}
  if(state[catId].fixture.length>0&&!confirm('¿Regenerar el fixture? Se perderán los resultados.'))return;
  state[catId].fixture=[]; state[catId].postponed={};
  let list=[...valid];
  if(list.length%2!==0) list.push('__BYE__');
  const n=list.length, fixed=list[0]; let rotating=list.slice(1);
  let curDate=new Date(state[catId].startDate+'T12:00:00');
  // Track how many times each team has played in each slot position
  const slotCount={}; // {team: [slot0count, slot1count, ...]}
  valid.forEach(t=>{ slotCount[t]=Array(n/2).fill(0); });

  for(let r=0;r<n-1;r++){
    const current=[fixed,...rotating]; const pairs=[];
    for(let i=0;i<n/2;i++){
      const a=current[i], b=current[n-1-i];
      if(a==='__BYE__'||b==='__BYE__'){
        const real=a==='__BYE__'?b:a;
        pairs.push({home:real,away:'__BYE__',rest:true});
      } else {
        // Alternate home/away based on round parity
        const swap=r%2!==0;
        pairs.push({home:swap?b:a, away:swap?a:b, rest:false});
      }
    }
    // Sort main pairs so each team gets varied slot positions
    const mainP=pairs.filter(p=>!p.rest);
    const restP=pairs.filter(p=>p.rest);
    // Sort by which team has appeared least in slot 0
    mainP.sort((a,b)=>{
      const aMin=Math.min(slotCount[a.home]?.[0]||0, slotCount[a.away]?.[0]||0);
      const bMin=Math.min(slotCount[b.home]?.[0]||0, slotCount[b.away]?.[0]||0);
      return aMin-bMin || Math.random()-0.5;
    });
    // Update slot counts
    mainP.forEach((p,si)=>{
      if(slotCount[p.home]) slotCount[p.home][si]=(slotCount[p.home][si]||0)+1;
      if(slotCount[p.away]) slotCount[p.away][si]=(slotCount[p.away][si]||0)+1;
    });
    const sorted=[...mainP,...restP];
    const matches=sorted.map(p=>p.rest
      ?{home:p.home,away:'__BYE__',homeGoals:null,awayGoals:null,walkover:false,played:false,rest:true,customTime:null,homeYellow:0,homeRed:0,awayYellow:0,awayRed:0}
      :{home:p.home,away:p.away,homeGoals:null,awayGoals:null,walkover:null,played:false,rest:false,customTime:null,homeYellow:0,homeRed:0,awayYellow:0,awayRed:0}
    );
    state[catId].fixture.push({date:formatDate(curDate),matches});
    rotating.push(rotating.shift());
    curDate=addDays(curDate,7);
  }
  activeSection='fixture'; showSection('fixture');
}
function fillRandomScores(catId){
  // Check if fixture already has scores - if so, clear them instead
  const hasScores=state[catId].fixture.some(f=>f.matches.some(m=>!m.rest&&m.played));
  if(hasScores){
    if(!confirm('¿Borrar todos los marcadores del fixture?'))return;
    state[catId].fixture.forEach(fecha=>{

// ── ELIMINACION PHASE ────────────────────────────────────────

function generateEliminacion(catId){
  if(!confirm('¿Generar los partidos de la Fase de Eliminación? Se usará la tabla de posiciones actual.'))return;
  const standings=computeStandings(catId);
  const n=standings.length;
  if(n<2){alert('Se necesitan al menos 2 equipos.');return;}
  const matches=[];
  const isOdd=n%2!==0;

  if(!isOdd){
    // EVEN: 1vs last, 2vs penultimo, etc.
    for(let i=0;i<n/2;i++){
      matches.push(createElimMatch(standings[i].name, standings[n-1-i].name, i+1, i+1, n-i));
    }
  } else {
    // ODD: 1st place gets bye, 2vs last, 3vs penultimo, etc.
    const byeTeam=standings[0].name;
    matches.push({home:byeTeam,away:'__BYE__',homeGoals:3,awayGoals:0,played:true,walkover:false,
      homeYellow:0,homeRed:0,awayYellow:0,awayRed:0,matchDate:'',matchTime:'',
      hasPens:false,homePens:null,awayPens:null,isBye:true,posHome:1,posAway:0});
    for(let i=1;i<Math.ceil(n/2);i++){
      matches.push(createElimMatch(standings[i].name, standings[n-i].name, i+1, i+1, n+1-i));
    }
  }

  state[catId].eliminacion.matches=matches;
  state[catId].eliminacion.generated=true;
  state[catId].eliminacion.locked={};
  renderAll();
}

function createElimMatch(home,away,matchNum,posHome,posAway){
  return{home,away,homeGoals:null,awayGoals:null,played:false,walkover:false,
    homeYellow:0,homeRed:0,awayYellow:0,awayRed:0,
    matchDate:'',matchTime:'',hasPens:false,homePens:null,awayPens:null,
    isBye:false,posHome,posAway};
}

// ── BEST LOSER & FINAL PHASE ─────────────────────────────────

function getElimLosers(catId){
  // Returns all losers from non-bye matches with their score differential
  const matches=state[catId].eliminacion.matches;
  const losers=[];
  matches.forEach(m=>{
    if(!m.played||m.isBye) return;
    const winner=getElimWinner(m);
    if(!winner) return;
    const loser=winner===m.home?m.away:m.home;
    const isLoserHome=loser===m.home;
    const loserGoals=isLoserHome?m.homeGoals:m.awayGoals;
    const winnerGoals=isLoserHome?m.awayGoals:m.homeGoals;
    const diff=loserGoals-winnerGoals; // negative = lost by more
    losers.push({name:loser, loserGoals, winnerGoals, diff, pts:loserGoals});
  });
  // Sort: best diff first (least negative), then most goals scored
  losers.sort((a,b)=>b.diff-a.diff||b.loserGoals-a.loserGoals);
  return losers;
}

function getElim8Teams(catId){
  // Returns 8 teams: winners + enough best losers to reach 8
  const matches=state[catId].eliminacion.matches;
  const winners=matches.map(m=>getElimWinner(m)).filter(Boolean);
  const losers=getElimLosers(catId);
  const needed=Math.max(0, 8-winners.length); // how many losers needed
  const selectedArr=state[catId].eliminacion.bestLoserSelected; // now array
  
  // Auto-select top N losers if not manually set
  let chosenLosers=[];
  if(Array.isArray(selectedArr)&&selectedArr.length>0){
    chosenLosers=selectedArr;
  } else {
    chosenLosers=losers.slice(0,needed).map(l=>l.name);
  }
  
  const teams=[...winners];
  chosenLosers.forEach(name=>{
    if(!teams.includes(name)) teams.push(name);
  });
  
  return{winners,teams,needed,chosenLosers,losers};
}

function allElimPlayed(catId){
  const matches=state[catId].eliminacion.matches;
  return matches.length>0&&matches.every(m=>getElimWinner(m));
}

function setBestLoser(catId, name){
  const elim=state[catId].eliminacion;
  const {needed}=getElim8Teams(catId);
  if(!Array.isArray(elim.bestLoserSelected)) elim.bestLoserSelected=[];
  const idx2=elim.bestLoserSelected.indexOf(name);
  if(idx2!==-1){
    // Deselect
    elim.bestLoserSelected.splice(idx2,1);
  } else if(elim.bestLoserSelected.length<needed){
    // Select if still need more
    elim.bestLoserSelected.push(name);
  } else {
    // Replace last selected with this one
    elim.bestLoserSelected[elim.bestLoserSelected.length-1]=name;
  }
  // Reset playoffs
  state[catId].playoffs={quarterfinals:[],semifinals:[],final:[],drawn:false};
  renderAll();
}

function resetEliminacion(catId){
  if(!confirm('¿Reiniciar la Fase de Eliminación? Se perderán todos los resultados.'))return;
  state[catId].eliminacion={matches:[],generated:false,locked:{}};
  renderAll();
}

function getElimWinner(m){
  if(!m||!m.played) return null;
  if(m.isBye) return m.home;
  if(m.walkover==='home') return m.home;
  if(m.walkover==='away') return m.away;
  if(m.homeGoals>m.awayGoals) return m.home;
  if(m.awayGoals>m.homeGoals) return m.away;
  if(m.hasPens&&m.homePens!==null&&m.awayPens!==null){
    if(m.homePens>m.awayPens) return m.home;
    if(m.awayPens>m.homePens) return m.away;
  }
  return null;
}

function setElimScore(catId,idx,side,val){
  const m=state[catId].eliminacion.matches[idx];
  m[side==='home'?'homeGoals':'awayGoals']=val===''||val===null?null:parseInt(val);
  m.played=m.homeGoals!==null&&m.awayGoals!==null;
  if(m.played&&m.homeGoals!==m.awayGoals){m.hasPens=false;m.homePens=null;m.awayPens=null;}
  renderAll();
}

function setElimPens(catId,idx,side,val){
  const m=state[catId].eliminacion.matches[idx];
  m[side==='home'?'homePens':'awayPens']=val===''||val===null?null:parseInt(val);
  m.hasPens=true;
  renderAll();
}

function setElimDate(catId,idx,val){state[catId].eliminacion.matches[idx].matchDate=val;renderAll();}
function setElimCancha(catId,idx,val){state[catId].eliminacion.matches[idx].cancha=val?parseInt(val):null;renderAll();}

function addElimCard(catId,idx,side,type){
  const m=state[catId].eliminacion.matches[idx];
  const k=side==='home'?(type==='yellow'?'homeYellow':'homeRed'):(type==='yellow'?'awayYellow':'awayRed');
  m[k]=(m[k]||0)+1; renderAll();

  const k=side==='home'?(type==='yellow'?'homeYellow':'homeRed'):(type==='yellow'?'awayYellow':'awayRed');

}

function lockPlayoffMatch(catId, phase, idx){

function unlockPlayoffMatch(catId, phase, idx){

// ── CANCHA ASSIGNMENT ────────────────────────────────────────
// Pattern: 27 slots per fecha, 3 canchas, categories rotate
// [catIndex, matchIndex] per slot - catIndex: 0=menores,1=medianos,2=mayores,3=supermaster
const CANCHA_PATTERN = [
  [0,0],[1,0],[2,0],  // hora 0
  [1,1],[2,1],[3,0],  // hora 1
  [2,2],[3,1],[0,1],  // hora 2
  [3,2],[0,2],[1,2],  // hora 3
  [0,3],[1,3],[2,3],  // hora 4
  [1,4],[2,4],[3,3],  // hora 5
  [2,5],[3,4],[0,4],  // hora 6
  [3,5],[0,5],[1,5],  // hora 7
  [0,6],[1,6],[2,6],  // hora 8
];
const CAT_ORDER=['menores','medianos','mayores','supermaster'];

function getCanchaForMatch(catId, matchIdx){
  // Find which slot this match occupies
  const catIndex=CAT_ORDER.indexOf(catId);
  if(catIndex===-1) return null;
  for(let s=0;s<CANCHA_PATTERN.length;s++){
    if(CANCHA_PATTERN[s][0]===catIndex && CANCHA_PATTERN[s][1]===matchIdx){
      return (s%3)+1; // cancha 1, 2, or 3
    }
  }
  return null;
}

function getCanchaTime(catId, matchIdx, baseTime, duration, interval){
  // Get the hora_slot for this match
  const catIndex=CAT_ORDER.indexOf(catId);
  if(catIndex===-1) return null;
  for(let s=0;s<CANCHA_PATTERN.length;s++){
    if(CANCHA_PATTERN[s][0]===catIndex && CANCHA_PATTERN[s][1]===matchIdx){
      const horaSlot=Math.floor(s/3);
      // Calculate time: baseTime + horaSlot * (duration + interval) minutes
      const [h,m]=baseTime.split(':').map(Number);
      const totalMins=h*60+m+horaSlot*(parseInt(duration)+parseInt(interval));
      const hh=Math.floor(totalMins/60)%24;
      const mm=totalMins%60;
      return (hh<10?'0'+hh:hh)+':'+(mm<10?'0'+mm:mm);
    }
  }
  return null;
}

function clearFechaScores(catId, fi){
  if(!confirm('¿Borrar todos los marcadores y tarjetas de esta fecha?'))return;
  state[catId].fixture[fi].matches.forEach(m=>{
    if(m.rest) return;
    m.homeGoals=null; m.awayGoals=null;
    m.played=false; m.walkover=false;
    m.homeYellow=0; m.homeRed=0;
    m.awayYellow=0; m.awayRed=0;
  });
  // Also unlock fecha if it was locked
  delete state[catId].lockedFechas[fi];
  renderAll();
}

function clearFixture(catId){
  if(state[catId].fixture.length===0)return;
  if(!confirm('¿Limpiar el fixture? Se borrarán también los datos de la fase de eliminación y fase final.'))return;
  state[catId].fixture=[];
  state[catId].postponed={};
  state[catId].lockedFechas={};
  state[catId].lockedPlayoffs={};
  state[catId].eliminacion={matches:[],generated:false,locked:{}};
  state[catId].playoffs={quarterfinals:[],semifinals:[],final:[],drawn:false};
  renderAll();
}

// ── POSTPONE CASCADE ──────────────────────────────────────────
function togglePostpone(catId,fi){
  const s=state[catId];
  if(s.postponed[fi]){
    delete s.postponed[fi];
    for(let i=fi;i<s.fixture.length;i++) s.fixture[i].date=formatDate(addDays(s.fixture[i].date+'T12:00:00',-7));
  } else {
    s.postponed[fi]=true;
    for(let i=fi;i<s.fixture.length;i++) s.fixture[i].date=formatDate(addDays(s.fixture[i].date+'T12:00:00',7));
  }
  renderAll();
}

function renderFechaTable(matches, fi, catId, fechaLocked){
  const mainMatches=matches.filter(m=>!m.rest);
  const restMatch=matches.find(m=>m.rest);
  const times=computeMatchTimes(mainMatches.length, catId);
  let rows='';
  mainMatches.forEach((m,idx)=>{
    const realMi=matches.indexOf(m);
    const timeVal=m.customTime||times[idx];
    const t12=to12h(timeVal);
    const homeWin=m.played&&m.homeGoals>m.awayGoals;
    const awayWin=m.played&&m.awayGoals>m.homeGoals;
    const draw=m.played&&m.homeGoals===m.awayGoals;
    const hB=m.played?`<span class="result-badge ${homeWin?'badge-win':draw?'badge-draw':'badge-loss'}">${homeWin?'G':draw?'E':'P'}</span>`:'';
    const aB=m.played?`<span class="result-badge ${awayWin?'badge-win':draw?'badge-draw':'badge-loss'}">${awayWin?'G':draw?'E':'P'}</span>`:'';
    const isWk=m.walkover&&m.walkover!==false;
    const wkLabel=m.walkover==='home'?'WO▶H':m.walkover==='away'?'WO▶A':'W/O';
    const hv=m.homeGoals!==null?m.homeGoals:'';
    const av=m.awayGoals!==null?m.awayGoals:'';
    const editBlocked=fechaLocked&&currentRango!==1;
    const canCards=currentRango===1&&!isVisitor&&!editBlocked;
    const hy=m.homeYellow||0,hr=m.homeRed||0,ay=m.awayYellow||0,ar=m.awayRed||0;
    // Build dot arrays for each team
    function buildCards(count,type,cId,fIdx,mIdx,side){
      const pendClass=type==='yellow'?'dot-pending-y':'dot-pending-r';
      const cardClass=type==='yellow'?'card-y':'card-r';
      const title=type==='yellow'?'Tarjeta amarilla':'Tarjeta roja';
      let out='';
      for(let d=0;d<count;d++){
        out+=`<span class="card-active ${cardClass}" onclick="removeCard('${cId}',${fIdx},${mIdx},'${side}','${type}',${d})" title="${title} — clic para quitar"></span>`;
      }
      if(canCards){
        out+=`<span class="card-dot ${pendClass}" onclick="addCard('${cId}',${fIdx},${mIdx},'${side}','${type}')" title="Agregar ${title.toLowerCase()}"></span>`;
      }
      return out?`<span class="cards-wrap">${out}</span>`:'';
    }
    // Home: yellow+red LEFT of name | Away: yellow+red RIGHT of name
    const homeCardsHtml=buildCards(hy,'yellow',catId,fi,realMi,'home')+buildCards(hr,'red',catId,fi,realMi,'home');
    const awayCardsHtml=buildCards(ay,'yellow',catId,fi,realMi,'away')+buildCards(ar,'red',catId,fi,realMi,'away');
    const canchaNum=getCanchaForMatch(catId,idx);
    const canchaLabel=canchaNum?`<span class="cancha-badge cancha-${canchaNum}">Cancha ${canchaNum}</span>`:'';
    // Auto-assign cancha time if no custom time set
    if(!m.customTime && canchaNum){
      const autoTime=getCanchaTime(catId,idx,state[catId].matchTime,state[catId].matchDuration,state[catId].matchInterval);
      if(autoTime) m.customTime=autoTime;
    }
    rows+=`<tr class="${m.played?'played-row':''}">
      <td class="td-np">${idx+1}</td>
      <td class="td-hora">
        <span class="time-display">${t12}</span>
        ${!editBlocked?`<span class="time-edit visitor-hidden"><input type="time" value="${timeVal}" onchange="setCustomTime('${catId}',${fi},${realMi},this.value)" title="Editar hora"></span>`:''}
      </td>
      <td class="td-cancha">${canchaLabel}</td>
      <td class="td-local">${hB} ${homeCardsHtml}<span class="team-name-cell">${escHtml(m.home)}</span></td>
      <td class="td-marcador">
        <div class="score-wrapper">
          <input class="score-input${m.played?' filled':''}" type="number" min="0" max="99" value="${hv}" placeholder="—" onchange="setScore('${catId}',${fi},${realMi},'home',this.value)" ${(isWk||isVisitor||editBlocked)?'disabled':''}>
          <span class="score-sep">:</span>
          <input class="score-input${m.played?' filled':''}" type="number" min="0" max="99" value="${av}" placeholder="—" onchange="setScore('${catId}',${fi},${realMi},'away',this.value)" ${(isWk||isVisitor||editBlocked)?'disabled':''}>
        </div>
      </td>
      <td class="td-visita"><span class="team-name-cell">${escHtml(m.away)}</span>${awayCardsHtml} ${aB}</td>
      <td class="td-wo" style="${editBlocked?'pointer-events:none;opacity:.4;':''}">
        ${(isVisitor||editBlocked)?
          (isWk?`<span style="font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;background:#e8001c;color:#fff;">WO ${m.walkover==='home'?'L':'V'}</span>`:'')
          :`<div style="display:flex;flex-direction:column;gap:2px;align-items:center;">
            <button onclick="setWODirect('${catId}',${fi},${realMi},'home')" style="font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;padding:2px 5px;border:none;border-radius:2px;cursor:pointer;width:36px;background:${m.walkover==='home'?'#e8001c':'#555'};color:#fff;">WO L</button>
            <button onclick="setWODirect('${catId}',${fi},${realMi},'away')" style="font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;padding:2px 5px;border:none;border-radius:2px;cursor:pointer;width:36px;background:${m.walkover==='away'?'#e8001c':'#555'};color:#fff;">WO V</button>
          </div>`}
      </td>
    </tr>`;
  });
  // Cards total for this fecha
  if(restMatch) rows+=`<tr class="rest-tr"><td colspan="6">🔵 ${escHtml(restMatch.home)} — DESCANSA ESTA FECHA</td></tr>`;
  return`<div style="overflow-x:auto;"><table class="fixture-table">
    <thead><tr>
      <th class="col-np">#P</th>
      <th class="col-hora">🕐 Hora</th>
      <th class="td-cancha">Cancha</th>
      <th class="col-local" style="text-align:right;">L</th>
      <th class="col-marcador">Res</th>
      <th class="col-visita" style="text-align:left;">V</th>
      <th class="col-wo">W/O</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ── TABLA ─────────────────────────────────────────────────────
function computeStandings(catId){
  const valid=getValidTeams(catId);
  const stats={};
  valid.forEach(t=>{stats[t]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};});
  state[catId].fixture.forEach(fecha=>{
    fecha.matches.forEach(m=>{
      if(m.rest||!m.played)return;
      const h=m.home,a=m.away;
      if(!stats[h]||!stats[a])return;
      const hg=parseInt(m.homeGoals)||0,ag=parseInt(m.awayGoals)||0;
      stats[h].pj++;stats[a].pj++;
      stats[h].gf+=hg;stats[h].gc+=ag;
      stats[a].gf+=ag;stats[a].gc+=hg;
      if(hg>ag){stats[h].pts+=3;stats[h].pg++;stats[a].pp++;}
      else if(hg<ag){stats[a].pts+=3;stats[a].pg++;stats[h].pp++;}
      else{stats[h].pts++;stats[a].pts++;stats[h].pe++;stats[a].pe++;}
    });
  });
  return Object.entries(stats).map(([name,s])=>({name,...s,dg:s.gf-s.gc}))
    .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.name.localeCompare(b.name));
}

        <div class="stat-item"><div class="stat-value" style="color:${color};">${tp>0?(tg/tp).toFixed(1):'—'}</div><div class="stat-label">Goles/Partido</div></div>

  }

  // ── Build elimination HTML ────────────────────────────────
  let elimHtml='';
  try { elimHtml=renderEliminacion(cat, s, activeCat); } catch(e){ console.error('elim error:',e); elimHtml=''; }

  // ── Build playoffs HTML ───────────────────────────────────
  let poHtml='';
  try { poHtml=renderPlayoffs(cat, s, activeCat); } catch(e){ console.error('playoffs error:',e); poHtml=''; }

  container.innerHTML=standingsHtml;
}


function allFechasComplete(catId){
  const s=state[catId];
  if(s.fixture.length===0) return false;
  return s.fixture.every(fecha=>{
    const main=fecha.matches.filter(m=>!m.rest);
    return main.length>0 && main.every(m=>m.played);
  });
}

function getTop8(catId){
  const standings=computeStandings(catId);
  return standings.slice(0,Math.min(8,standings.length));
}

function drawQuarterfinals(catId){
  // Use elimination phase winners + best loser
  const {teams:elimTeams}=getElim8Teams(catId);
  const useElim=elimTeams.length>=2;
  const top8=useElim?elimTeams.map(t=>({name:t})):getTop8(catId);
  if(top8.length<2){alert('No hay suficientes equipos. Completa la fase de eliminación primero.');return;}
  if(state[catId].playoffs.drawn && !confirm('¿Regenerar los 4tos de final? Se perderán los resultados existentes.'))return;

  const teams=top8.map(t=>(typeof t==='string'?t:t.name)).filter(Boolean);
  const n=teams.length;
  // Seeded bracket: 1vs8, 2vs7, 3vs6, 4vs5
  const pairs=[[0,7],[1,6],[2,5],[3,4]];
  const qf=pairs.map(([a,b])=>({
    home: teams[a]||'POR DEFINIR',
    away: teams[b]||'POR DEFINIR',
    homeGoals:null, awayGoals:null,
    homePens:null, awayPens:null,
    played:false, walkover:false, hasPens:false
  })).filter(m=>m.home!=='POR DEFINIR'||m.away!=='POR DEFINIR');

  state[catId].playoffs.quarterfinals=qf;
  state[catId].playoffs.semifinals=[];
  state[catId].playoffs.final=[];
  state[catId].playoffs.drawn=true;
  renderAll();
}

function resetDraw(catId){
  if(!confirm('¿Eliminar el sorteo y todos los resultados de la fase final?'))return;
  state[catId].playoffs={quarterfinals:[],semifinals:[],final:[],drawn:false};
  renderAll();
}

function getWinner(match){
  if(!match||!match.played) return null;
  if(match.walkover==='home') return match.home;
  if(match.walkover==='away') return match.away;
  if(match.homeGoals>match.awayGoals) return match.home;
  if(match.awayGoals>match.homeGoals) return match.away;
  // Draw: check penalties
  if(match.hasPens && match.homePens!==null && match.awayPens!==null){
    if(match.homePens>match.awayPens) return match.home;
    if(match.awayPens>match.homePens) return match.away;
  }
  return null; // still tied
}

function advanceSemifinals(catId){
  const qf=state[catId].playoffs.quarterfinals;
  const winners=qf.map(m=>getWinner(m)).filter(Boolean);
  if(winners.length<2) return;
  // Only rebuild semis if not already set
  if(state[catId].playoffs.semifinals.length===0){
    const sf=[];
    for(let i=0;i<winners.length;i+=2){
      sf.push({home:winners[i],away:winners[i+1]||'POR DEFINIR',homeGoals:null,awayGoals:null,homePens:null,awayPens:null,played:false,walkover:false,hasPens:false});
    }
    state[catId].playoffs.semifinals=sf;
    renderAll();
  }
}

function advanceFinal(catId){
  const sf=state[catId].playoffs.semifinals;
  const winners=sf.map(m=>getWinner(m)).filter(Boolean);
  if(winners.length<2) return;
  if(state[catId].playoffs.final.length===0){
    state[catId].playoffs.final=[{home:winners[0],away:winners[1],homeGoals:null,awayGoals:null,homePens:null,awayPens:null,played:false,walkover:false,hasPens:false}];
    renderAll();
  }
}

function setPlayoffPens(catId,phase,idx,side,val){
  const match=state[catId].playoffs[phase][idx];
  match[side==='home'?'homePens':'awayPens']=val===''||val===null?null:parseInt(val);
  match.hasPens=true;
  // Auto-advance if winner determined by pens
  const allQFDone=state[catId].playoffs.quarterfinals.length>0&&state[catId].playoffs.quarterfinals.every(m=>getWinner(m));
  if(allQFDone&&state[catId].playoffs.semifinals.length===0) advanceSemifinals(catId);
  const allSFDone=state[catId].playoffs.semifinals.length>0&&state[catId].playoffs.semifinals.every(m=>getWinner(m));
  if(allSFDone&&state[catId].playoffs.final.length===0) advanceFinal(catId);
  renderAll();
}
function setPlayoffScore(catId,phase,idx,side,val){
  const match=state[catId].playoffs[phase][idx];
  match[side==='home'?'homeGoals':'awayGoals']=val===''||val===null?null:parseInt(val);
  match.played=match.homeGoals!==null&&match.awayGoals!==null;
  // Reset pens if score is no longer a draw
  if(match.played && match.homeGoals!==match.awayGoals){ match.hasPens=false; match.homePens=null; match.awayPens=null; }
  // Auto-advance phases
  const allQFDone=state[catId].playoffs.quarterfinals.length>0&&state[catId].playoffs.quarterfinals.every(m=>getWinner(m));
  if(allQFDone&&state[catId].playoffs.semifinals.length===0) advanceSemifinals(catId);
  const allSFDone=state[catId].playoffs.semifinals.length>0&&state[catId].playoffs.semifinals.every(m=>getWinner(m));
  if(allSFDone&&state[catId].playoffs.final.length===0) advanceFinal(catId);
  renderAll();
}

function setPlayoffWO(catId,phase,idx,val){
  const m=state[catId].playoffs[phase][idx];
  if(!val||val==='none'){m.walkover=false;m.played=false;m.homeGoals=null;m.awayGoals=null;m.hasPens=false;m.homePens=null;m.awayPens=null;}
  else{m.walkover=val;m.played=true;m.hasPens=false;if(val==='home'){m.homeGoals=3;m.awayGoals=0;}else{m.homeGoals=0;m.awayGoals=3;}}
  closeModal();
  saveData(); // ← auto-save after WO
  const allQFDone=state[catId].playoffs.quarterfinals.length>0&&state[catId].playoffs.quarterfinals.every(m=>getWinner(m));
  if(allQFDone&&state[catId].playoffs.semifinals.length===0) advanceSemifinals(catId);
  const allSFDone=state[catId].playoffs.semifinals.length>0&&state[catId].playoffs.semifinals.every(m=>getWinner(m));
  if(allSFDone&&state[catId].playoffs.final.length===0) advanceFinal(catId);
  renderAll();
}

  // ── SF SECTION ────────────────────────────────────────────

    }
  }

  const resetBtn=currentRango===1&&po.drawn?`<button class="btn-reset-draw" onclick="resetDraw(window._fcat)">🔄 Reiniciar Fase Final</button>`:'';

function renderPlayoffMatch(m,i,phase,catId,color,isEditable,label){
  const winner=getWinner(m);
  const homeWin=m.played&&m.homeGoals>m.awayGoals;
  const awayWin=m.played&&m.awayGoals>m.homeGoals;
  const draw=m.played&&m.homeGoals===m.awayGoals&&!m.walkover;
  const hv=m.homeGoals!==null?m.homeGoals:'';
  const av=m.awayGoals!==null?m.awayGoals:'';
  const isWk=m.walkover&&m.walkover!==false;
  const wkLabel=m.walkover==='home'?'WO▶H':m.walkover==='away'?'WO▶A':'W/O';

  const hB=m.played?`<span class="playoff-result-badge ${homeWin?'badge-win':draw?'badge-draw':'badge-loss'}">${homeWin?'G':draw?'E':'P'}</span>`:'';
  const aB=m.played?`<span class="playoff-result-badge ${awayWin?'badge-win':draw?'badge-draw':'badge-loss'}">${awayWin?'G':draw?'E':'P'}</span>`:'';

  const winnerBadge=winner?`<div style="text-align:center;margin:10px 8px 4px;padding:10px;background:linear-gradient(135deg,${color}22,${color}11);border:2px solid ${color};border-radius:6px;">
    <div style="font-family:'Roboto Condensed',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:4px;">✅ Avanza a la siguiente fase</div>
    <span class="playoff-winner" style="background:${color};color:#fff;">🏅 ${escHtml(winner)}</span>
  </div>`:'';

  // ── Lock & editable check (must be before buildPOCards) ──
  const poLocked=isPlayoffLocked(catId,phase,i);
  const poEditBlocked=poLocked&&currentRango!==1;
  const effectiveEditable=isEditable&&!poEditBlocked;

  // ── Cards system ──
  const hy=m.homeYellow||0, hr=m.homeRed||0, ay=m.awayYellow||0, ar=m.awayRed||0;
  function buildPOCards(count,type,side){
    const pendClass=type==='yellow'?'dot-pending-y':'dot-pending-r';
    const cardClass=type==='yellow'?'card-y':'card-r';
    const title=type==='yellow'?'Tarjeta amarilla':'Tarjeta roja';
    let out='';
    for(let d=0;d<count;d++){
      out+=`<span class="card-active ${cardClass}" onclick="removePlayoffCard('${catId}','${phase}',${i},'${side}','${type}',${d})" title="${title} — clic para quitar"></span>`;
    }
    if(effectiveEditable){
      out+=`<span class="card-dot ${pendClass}" onclick="addPlayoffCard('${catId}','${phase}',${i},'${side}','${type}')" title="Agregar ${title.toLowerCase()}"></span>`;
    }
    return out?`<span class="cards-wrap">${out}</span>`:'';
  }
  const homeCards=buildPOCards(hy,'yellow','home')+buildPOCards(hr,'red','home');
  const awayCards=buildPOCards(ay,'yellow','away')+buildPOCards(ar,'red','away');

  // ── Penalties ──
  let pensHtml='';
  if(draw){
    const hp=m.homePens!==null?m.homePens:'';
    const ap=m.awayPens!==null?m.awayPens:'';
    pensHtml=`<div style="background:#fff8e1;border-top:2px dashed #ffc107;padding:8px 12px;">
      <div style="font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;color:#856404;text-align:center;margin-bottom:6px;letter-spacing:1px;">🥅 Definición por Penales</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;">
        <div style="text-align:right;font-family:'Roboto Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;color:#555;">${escHtml(m.home)}</div>
        <div style="display:flex;align-items:center;gap:3px;">
          <input class="playoff-score-input" type="number" min="0" max="99" value="${hp}" placeholder="—" style="width:32px;height:30px;font-size:14px;border-color:#ffc107;"
            onchange="setPlayoffPens('${catId}','${phase}',${i},'home',this.value)" ${!effectiveEditable?'disabled':''}>
          <span class="playoff-score-sep" style="font-size:12px;">:</span>
          <input class="playoff-score-input" type="number" min="0" max="99" value="${ap}" placeholder="—" style="width:32px;height:30px;font-size:14px;border-color:#ffc107;"
            onchange="setPlayoffPens('${catId}','${phase}',${i},'away',this.value)" ${!effectiveEditable?'disabled':''}>
        </div>
        <div style="text-align:left;font-family:'Roboto Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;color:#555;">${escHtml(m.away)}</div>
      </div>
    </div>`;
  }

  // ── Match date & time ──
  const matchDate=m.matchDate||'';
  const matchTime=m.matchTime||'';
  const dateDisplay=matchDate?`<span style="font-family:'Oswald',sans-serif;font-size:13px;color:#fff;font-weight:700;letter-spacing:.5px;">${formatDisplayDate(matchDate)}${matchTime?' &nbsp;·&nbsp; '+to12h(matchTime):''}</span>`:'';
  const dateInput=isEditable?`<input type="date" value="${matchDate}" onchange="setPlayoffDate('${catId}','${phase}',${i},this.value)" style="font-family:'Roboto Condensed',sans-serif;font-size:12px;background:#333;border:1px solid #666;color:#fff;padding:3px 6px;border-radius:3px;cursor:pointer;width:110px;" title="Fecha del partido">`:'';
